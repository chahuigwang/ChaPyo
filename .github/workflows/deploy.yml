name: CI/CD

on:
  push:
    branches:
      - master
    paths:
      - 'BE/**'
      - '.github/workflows/**'

jobs:
  # ── 1단계: 테스트 ──────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Maven 캐시
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: 테스트 실행
        run: cd BE && mvn test

  # ── 2단계: 빌드 ────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Maven 캐시
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: 빌드
        run: cd BE && mvn clean package -DskipTests

      - name: jar 파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: BE/target/*.jar
          retention-days: 1

  # ── 3단계: Docker 빌드 & push (arm64) ──────
  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: jar 파일 다운로드
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: BE/target/

      - name: QEMU 설정 (arm64 크로스 컴파일)
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker 빌드 & push
        uses: docker/build-push-action@v5
        with:
          context: BE
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/chapyo:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/chapyo:${{ github.sha }}

  # ── 4단계: 배포 ────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: docker-compose.yml 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/chapyo/"

      - name: OCI 서버 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/chapyo
            docker compose pull app
            docker compose up -d
            echo "Deploy complete"

  # ── Discord 알림 ──────────────────────────
      - name: Discord 성공 알림
        if: success()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"✅ 배포 성공\\ncommit: \`${{ github.sha }}\`\\n${{ github.event.head_commit.message }}\"}"

      - name: Discord 실패 알림
        if: failure()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ 배포 실패\\ncommit: \`${{ github.sha }}\`\\n${{ github.event.head_commit.message }}\"}"
